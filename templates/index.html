<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Glasses AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050508;
            color: white;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            color: #00e5ff;
            font-size: 22px;
            letter-spacing: 3px;
        }
        .header p {
            color: #555;
            font-size: 11px;
            letter-spacing: 2px;
        }
        .glasses-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }
        .lens {
            flex: 1;
            height: 240px;
            border: 2px solid #00e5ff33;
            border-radius: 20px;
            background: #0a0a1a;
            position: relative;
            overflow: hidden;
        }
        .lens-label {
            position: absolute;
            top: 10px;
            left: 12px;
            font-size: 9px;
            color: #00e5ff;
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 10;
        }
        .scan-line {
            position: absolute;
            left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00e5ff, transparent);
            animation: scan 2s linear infinite;
            z-index: 10;
        }
        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 18px;
            transform: scaleX(-1);
        }
        .bridge {
            width: 20px;
            min-width: 20px;
            border-top: 2px solid #00e5ff33;
            border-bottom: 2px solid #00e5ff33;
            height: 30px;
        }
        .hud-panel {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            height: 100%;
            justify-content: center;
        }
        .hud-row {
            background: rgba(0,229,255,0.05);
            border: 1px solid rgba(0,229,255,0.1);
            border-radius: 8px;
            padding: 7px 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
        }
        .hud-title {
            color: #00e5ff;
            font-size: 9px;
            letter-spacing: 1px;
        }
        .hud-value {
            color: #ccc;
            font-size: 11px;
        }
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #00ff88;
            animation: blink 1.5s infinite;
            margin-left: auto;
        }
        @keyframes blink {
            0%,100% { opacity: 1; }
            50% { opacity: 0.2; }
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }
        .ctrl-btn {
            background: #0a0a1a;
            border: 1px solid #00e5ff33;
            color: #aaa;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .ctrl-btn:hover, .ctrl-btn.active {
            border-color: #00e5ff;
            color: #00e5ff;
            background: rgba(0,229,255,0.1);
        }
        .detection-panel {
            max-width: 900px;
            margin: 0 auto 20px;
            background: #0a0a1a;
            border: 1px solid #00e5ff22;
            border-radius: 12px;
            padding: 15px;
        }
        .panel-title {
            font-size: 10px;
            color: #00e5ff;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }
        .detection-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #ffffff08;
            font-size: 12px;
        }
        .det-name { flex: 1; color: #ccc; }
        .det-conf {
            font-size: 10px;
            color: #00e5ff;
            background: rgba(0,229,255,0.1);
            padding: 2px 8px;
            border-radius: 10px;
        }
        .footer {
            text-align: center;
            font-size: 9px;
            color: #333;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>SMART GLASSES AI</h1>
        <p>by Keshav Goyal — System Online</p>
    </div>

    <div class="glasses-container">
        <!-- Left Lens - Camera -->
        <div class="lens">
            <div class="lens-label">Camera Feed</div>
            <div class="scan-line"></div>
            <video id="webcam" autoplay playsinline></video>
        </div>

        <div class="bridge"></div>

        <!-- Right Lens - HUD -->
        <div class="lens">
            <div class="lens-label">HUD Display</div>
            <div class="hud-panel">
                <div class="hud-row">
                    <span>🟢</span>
                    <div>
                        <div class="hud-title">Status</div>
                        <div class="hud-value">System Online</div>
                    </div>
                    <div class="status-dot"></div>
                </div>
                <div class="hud-row">
                    <span>👁</span>
                    <div>
                        <div class="hud-title">Detection</div>
                        <div class="hud-value">Ready</div>
                    </div>
                </div>
                <div class="hud-row">
                    <span>🎤</span>
                    <div>
                        <div class="hud-title">Assistant</div>
                        <div class="hud-value">Listening...</div>
                    </div>
                </div>
                <div class="hud-row">
                    <span>🔋</span>
                    <div>
                        <div class="hud-title">Battery</div>
                        <div class="hud-value">87%</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <button class="ctrl-btn active">👁 Detect</button>
        <button class="ctrl-btn">🎤 Voice</button>
        <button class="ctrl-btn">📖 Read Text</button>
        <button class="ctrl-btn">🧭 Navigate</button>
        <button class="ctrl-btn">⭐ Context</button>
        <button class="ctrl-btn">🎵 Music</button>
        <button class="ctrl-btn">📞 Call</button>
    </div>

    <!-- Detection Results -->
    <div class="detection-panel">
        <div class="panel-title">Detection Results</div>
        <div id="detection-list"></div>
        
    </div>
    </div>

    <div class="footer">Powered by Python · Flask · OpenCV · Whisper AI</div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <script>
    const video = document.getElementById('webcam');
    const detectionList = document.getElementById('detection-list');

    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                runDetection();
            };
        })
        .catch(err => {
            console.log('Camera error:', err);
        });

    async function runDetection() {
        const model = await cocoSsd.load();
        detectFrame(model);
    }

    function detectFrame(model) {
        model.detect(video).then(predictions => {
            updateDetections(predictions);
            requestAnimationFrame(() => detectFrame(model));
        });
    }

    let stableDetections = {};
let stableResults = [];
    function updateDetections(predictions) {
        predictions = predictions.filter(p => p.score > 0.6);
    predictions = predictions.slice(0, 2);
    predictions = predictions.filter((p, index, self) => index === self.findIndex(t => t.class === p.class));

    predictions.forEach(prediction => {
        const cls = prediction.class;
        stableDetections[cls] = (stableDetections[cls] || 0) + 1;
    });

    Object.keys(stableDetections).forEach(cls => {
        if (!predictions.find(p => p.class === cls)) {
            stableDetections[cls] = 0;
        }
    });

    stableResults = predictions.filter(p => stableDetections[p.class] >= 3);

    detectionList.innerHTML = '';
    if (stableResults.length === 0) {
        detectionList.innerHTML = '<div class="detection-item"><span class="det-name">Scanning...</span></div>';
        return;
    }
    stableResults.forEach(prediction => {
        const confidence = Math.round(prediction.score * 100);
        const item = document.createElement('div');
        item.className = 'detection-item';
        item.innerHTML = `
            <span>🔍</span>
            <span class="det-name">${prediction.class}</span>
            <span class="det-conf">${confidence}%</span>
        `;
        detectionList.appendChild(item);
    });
}
</script>
</body>
</html>
